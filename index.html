<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#172b77">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Apple OS Simulator V4</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/camera-photos.css">
  <link rel="stylesheet" href="css/device-apps.css">
  <link rel="stylesheet" href="css/ios-ui.css">
  <link rel="stylesheet" href="css/core-apps.css">
  <link rel="stylesheet" href="css/island.css">
  <link rel="stylesheet" href="css/ios-polish.css">
  <link rel="stylesheet" href="css/ios-apps.css">
  <link rel="stylesheet" href="css/ios-apps-batch2.css">
  <link rel="stylesheet" href="css/ios-apps-batch3.css">
  <link rel="stylesheet" href="css/network-apps.css">
</head>
<body>
  <div class="network-banner" id="networkBanner"></div>
  <header class="topbar">
    <div><h1>Apple OS Simulator V4</h1><p>模組化 iPhone 與 Apple Watch 互動原型</p></div>
    <div class="toolbar"><button id="syncBtn">同步通知</button><button id="resetBtn">重設</button></div>
  </header>
  <main class="stage">
    <section class="panel">
      <div class="phone">
        <button class="hardware action" id="actionBtn" aria-label="動作按鈕"></button>
        <button class="hardware volume-up" id="volUp" aria-label="調高音量"></button>
        <button class="hardware volume-down" id="volDown" aria-label="調低音量"></button>
        <button class="hardware power" id="powerBtn" aria-label="電源按鈕"></button>
        <div class="screen" id="screen">
          <div class="island" id="island" role="button" tabindex="0" aria-label="動態島">
            <div class="island-compact"><button id="islandQuickAction" aria-label="動態島快速操作"><span id="islandIcon">●</span><span class="island-wave" id="islandWave"><i></i><i></i><i></i><i></i></span></button><b id="islandCompactText"></b></div>
            <div class="island-expanded">
              <div class="island-copy"><small id="islandLabel">動態島</small><b id="islandTitle">沒有進行中的活動</b><span id="islandText">點一下開啟</span></div>
              <div class="island-controls" id="islandControls"><button id="islandPrimary">▶</button><button id="islandOpen">↗</button></div>
              <div class="island-progress"><i id="islandProgress"></i></div>
            </div>
          </div>
          <div class="status"><span id="clock">12:06</span><button id="controlCenterTrigger" class="system-status" aria-label="開啟控制中心"><span class="cellular" aria-hidden="true"><i></i><i></i><i></i><i></i></span><span class="network-label">5G</span><span class="wifi-symbol" aria-hidden="true"></span><span class="battery" aria-label="電池"><i id="batteryLevel"></i></span></button></div>
          <button class="notice" id="notice"></button>
          <div class="home">
            <button class="widget launcher" data-app="weather"><b>臺北</b><strong>28°</strong><small>多雲</small></button>
            <button class="launcher" data-app="phone"><span class="app-icon">☎</span><small>電話</small></button>
            <button class="launcher" data-app="messages"><span class="app-icon">●</span><small>訊息</small></button>
            <button class="launcher" data-app="camera"><span class="app-icon">◉</span><small>相機</small></button>
            <button class="launcher" data-app="photos"><span class="app-icon">✿</span><small>照片</small></button>
            <button class="launcher" data-app="maps"><span class="app-icon">➤</span><small>地圖</small></button>
            <button class="launcher" data-app="music"><span class="app-icon">♪</span><small>音樂</small></button>
            <button class="launcher" data-app="settings"><span class="app-icon">⚙</span><small>設定</small></button>
            <button class="launcher" data-app="health"><span class="app-icon">♥</span><small>健康</small></button>
            <button class="launcher" data-app="calculator"><span class="app-icon">＋−</span><small>計算機</small></button>
            <button class="launcher" data-app="calendar"><span class="app-icon"><i>16</i></span><small>行事曆</small></button>
            <button class="launcher" data-app="clock"><span class="app-icon">◷</span><small>時鐘</small></button>
            <button class="launcher" data-app="notes"><span class="app-icon">≡</span><small>備忘錄</small></button>
            <button class="launcher" data-app="reminders"><span class="app-icon">✓</span><small>提醒事項</small></button>
            <button class="launcher" data-app="files"><span class="app-icon">▰</span><small>檔案</small></button>
            <button class="launcher" data-app="news"><span class="app-icon">N</span><small>新聞</small></button>
            <button class="launcher" data-app="translate"><span class="app-icon">文A</span><small>翻譯</small></button>
          </div>
          <div class="dock">
            <button class="launcher" data-app="safari"><span class="app-icon">⌁</span></button>
            <button class="launcher" data-app="mail"><span class="app-icon">✉</span></button>
            <button class="launcher" data-app="wallet"><span class="app-icon">▤</span></button>
            <button class="launcher" data-app="store"><span class="app-icon">A</span></button>
          </div>
          <button class="lock layer" id="lock"><small>7 月 16 日 星期四</small><strong id="lockclock">12:06</strong><span>向上滑動或點一下解鎖</span></button>
          <div class="notification-center layer" id="notificationCenter"><h2>通知中心</h2><div class="row">訊息：Apple Watch 已連線</div><div class="row">GitHub Pages：網站已部署</div></div>
          <div class="control-center layer" id="controlCenter">
            <div class="cc-header"><h2>控制中心</h2><button id="closeControlCenter">完成</button></div>
            <div class="cc-grid">
              <div class="cc-connectivity"><button id="ccAirplane">✈️<small>飛航</small></button><button id="ccWifi">📶<small>Wi‑Fi</small></button><button id="ccBluetooth">ᛒ<small>藍牙</small></button></div>
              <button class="cc-now-playing" id="ccMusic"><b id="ccMusicTitle">Midnight Drive</b><small id="ccMusicState">已暫停</small><span>◀︎　▶　▶︎</span></button>
              <label class="cc-slider">☀️<input id="ccBrightness" type="range" min="35" max="100" value="100"></label>
              <label class="cc-slider">🔊<input id="ccVolume" type="range" min="0" max="100" value="55"></label>
            </div>
          </div>
          <section class="app-window layer" id="appWindow"><header class="ios-nav"><button id="backApp" class="ios-back" aria-label="返回">‹ <span>返回</span></button><h2 id="appTitle">App</h2><button id="closeApp" class="ios-done">完成</button></header><div id="appContent"></div></section>
          <div class="volume-hud" id="volumeHud"><div id="volumeLevel"></div></div>
          <button class="homebar" id="homebar" aria-label="回到主畫面"></button>
        </div>
      </div>
    </section>
    <section class="panel watch-panel">
      <div class="watch">
        <button class="watch-hit crown" id="crownBtn" aria-label="數位錶冠"></button>
        <button class="watch-hit side" id="watchSideBtn" aria-label="側邊按鈕"></button>
        <div class="watch-screen">
          <div class="watch-face" id="watchFace"><small>SUN 16</small><strong id="watchClock">12:06</strong><span>🔴🟢🔵</span><small>按錶冠開啟 App</small></div>
          <div class="watch-apps" id="watchApps">
            <button data-watch-app="heart">❤️</button><button data-watch-app="workout">🏃</button><button data-watch-app="music">🎵</button>
            <button data-watch-app="weather">🌤️</button><button data-watch-app="messages">💬</button><button data-watch-app="settings">⚙️</button>
          </div>
          <button class="watch-notice" id="watchNotice"></button>
          <section class="watch-detail" id="watchDetail"><button id="watchBack">返回</button><h3 id="watchTitle">App</h3><div id="watchContent"></div></section>
          <section class="watch-recent" id="watchRecent"><button id="recentBack">返回</button><h3>最近使用</h3><button data-watch-app="music">🎵 音樂</button><button data-watch-app="heart">❤️ 心率</button><button data-watch-app="messages">💬 訊息</button></section>
        </div>
      </div>
      <p class="hint">錶冠切換錶面與 App；App 內按錶冠回到錶面。側邊按鈕顯示最近使用。</p>
    </section>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>

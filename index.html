<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Apple 模擬器 iPad 相容版</title>
<style>
:root{--bg:#eef2f8;--panel:#ffffffcc;--text:#17181b;--muted:#6f7480;--accent:#3478f6}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;background:linear-gradient(145deg,#f7f9fd,#e6ebf3);color:var(--text)}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
input{position:absolute;opacity:0;pointer-events:none}
header{padding:24px 18px 8px}
h1{font-size:28px;margin:0;letter-spacing:-.04em}
p{color:var(--muted);margin:6px 0 0}
.controls{display:flex;flex-wrap:wrap;gap:10px;padding:14px 18px}
.controls label{padding:12px 14px;border-radius:14px;background:var(--panel);box-shadow:0 7px 22px #1d26331c;font-weight:650;cursor:pointer;user-select:none}
#ios6:checked ~ .page label[for=ios6],
#ios14:checked ~ .page label[for=ios14],
#ios18:checked ~ .page label[for=ios18],
#ios26:checked ~ .page label[for=ios26],
#notify:checked ~ .page label[for=notify]{background:var(--accent);color:white}
.page{min-height:100vh}
.stage{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:8px 18px 30px;max-width:980px;margin:auto}
.card{background:var(--panel);border-radius:30px;padding:26px;box-shadow:0 20px 55px #1e263722;display:grid;place-items:center}
.phone{width:300px;height:610px;border:8px solid #16171b;border-radius:46px;background:#111;overflow:hidden;position:relative;box-shadow:0 25px 50px #0004}
.screen{position:absolute;inset:0;color:white;background:linear-gradient(150deg,#355bdf,#b147ce 55%,#ff9e6d);transition:.25s}
.status{height:34px;padding:8px 13px;font-size:12px;display:flex;justify-content:space-between;font-weight:700}
.island{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:108px;height:28px;border-radius:17px;background:black;z-index:3}
.home{padding:20px 14px 90px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px 10px}
.app{text-align:center;font-size:10px}
.icon{width:50px;height:50px;margin:auto auto 4px;border-radius:14px;display:grid;place-items:center;font-size:24px;background:#ffffff38;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 4px 12px #0003}
.widget{grid-column:span 2;height:105px;border-radius:18px;background:#ffffff32;backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);padding:12px;font-size:13px}
.dock{position:absolute;left:10px;right:10px;bottom:10px;height:76px;border-radius:24px;background:#ffffff38;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-around}
.homebar{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:108px;height:5px;background:white;border-radius:5px}
.notice{position:absolute;left:12px;right:12px;top:45px;background:#f5f5f3e8;color:#111;border-radius:18px;padding:12px;z-index:5;opacity:0;transform:translateY(-20px);transition:.25s;pointer-events:none}
.watch{width:220px;height:270px;border:10px solid #2a2b31;border-radius:66px;background:#111;padding:8px;box-shadow:0 22px 45px #0004;position:relative}
.watch:after{content:"";position:absolute;right:-18px;top:62px;width:12px;height:42px;background:#444;border-radius:7px}
.watch-screen{height:100%;border-radius:51px;background:#050506;color:white;display:grid;place-items:center;text-align:center;position:relative;overflow:hidden}
.time{font-size:44px;font-weight:300}
.rings{font-size:40px;margin:8px}
.watch-notice{position:absolute;inset:16px 10px auto;background:#2b2c31;border-radius:20px;padding:14px;opacity:0;transform:translateY(-14px);transition:.25s}
.explain{margin-top:18px;color:var(--muted);text-align:center;line-height:1.55;max-width:300px}
#notify:checked ~ .page .notice,
#notify:checked ~ .page .watch-notice{opacity:1;transform:none}
#ios6:checked ~ .page .screen{background:linear-gradient(#3f84c5,#7bc5e8 52%,#8dd05c 53%,#408238)}
#ios6:checked ~ .page .phone{border-radius:28px}
#ios6:checked ~ .page .island,#ios6:checked ~ .page .homebar,#ios6:checked ~ .page .widget{display:none}
#ios6:checked ~ .page .icon{border-radius:10px;box-shadow:inset 0 1px #fff9,0 4px 8px #0006}
#ios14:checked ~ .page .screen{background:linear-gradient(145deg,#ff875f,#ae4de4 48%,#325bea)}
#ios14:checked ~ .page .island{display:none}
#ios18:checked ~ .page .screen{background:radial-gradient(circle at 30% 30%,#ffd28f,transparent 32%),linear-gradient(150deg,#17256e,#8d3ad0 55%,#e75e8b)}
#ios26:checked ~ .page .screen{background:radial-gradient(circle at 50% 15%,#ffffffa8,transparent 30%),linear-gradient(150deg,#44a9ff,#6c5ce7 52%,#e056fd)}
#ios26:checked ~ .page .icon,#ios26:checked ~ .page .widget,#ios26:checked ~ .page .dock{border:1px solid #ffffff73;background:#ffffff27}
.versionText:before{content:"iOS 18：動態島、小工具與半透明介面。"}
#ios6:checked ~ .page .versionText:before{content:"iOS 6：舊式擬物化圖示與較厚重陰影。"}
#ios14:checked ~ .page .versionText:before{content:"iOS 14：加入主畫面小工具。"}
#ios26:checked ~ .page .versionText:before{content:"iOS 26 概念：更強的玻璃感與流體外觀。"}
.tip{margin:0 18px 18px;padding:13px 15px;border-radius:16px;background:#fff8;color:#4f5663;font-size:14px;line-height:1.5}
@media(max-width:760px){.stage{grid-template-columns:1fr}.phone{width:min(300px,82vw);height:610px}.card{padding:20px}}
</style>
</head>
<body>
<input type="radio" name="ios" id="ios6">
<input type="radio" name="ios" id="ios14">
<input type="radio" name="ios" id="ios18" checked>
<input type="radio" name="ios" id="ios26">
<input type="checkbox" id="notify">

<div class="page">
<header>
<h1>Apple 裝置系統模擬器</h1>
<p>iPad 相容版・不依賴 JavaScript</p>
</header>

<div class="controls">
<label for="ios6">iOS 6</label>
<label for="ios14">iOS 14</label>
<label for="ios18">iOS 18</label>
<label for="ios26">iOS 26 概念</label>
<label for="notify">傳送／關閉通知</label>
</div>

<div class="tip">
這個版本的按鈕使用 HTML＋CSS，不需要 JavaScript，因此在 iPad 的限制環境中比較不容易出現「按了沒反應」。
</div>

<main class="stage">
<section class="card">
<div class="phone">
<div class="screen">
<div class="island"></div>
<div class="status"><span>9:41</span><span>●●● 5G ◉</span></div>
<div class="notice"><b>訊息</b><br>Apple Watch 已同步收到通知。</div>
<div class="home">
<div class="widget"><b>天氣</b><br><span style="font-size:32px">28°</span><br>高雄・晴朗</div>
<div class="app"><div class="icon">📞</div>電話</div>
<div class="app"><div class="icon">💬</div>訊息</div>
<div class="app"><div class="icon">📷</div>相機</div>
<div class="app"><div class="icon">🌈</div>照片</div>
<div class="app"><div class="icon">🗺️</div>地圖</div>
<div class="app"><div class="icon">🎵</div>音樂</div>
<div class="app"><div class="icon">⚙️</div>設定</div>
<div class="app"><div class="icon">❤️</div>健康</div>
</div>
<div class="dock">
<div class="icon">🧭</div><div class="icon">✉️</div><div class="icon">💳</div><div class="icon">🅰️</div>
</div>
<div class="homebar"></div>
</div>
</div>
<div class="explain versionText"></div>
</section>

<section class="card">
<div>
<div class="watch">
<div class="watch-screen">
<div>
<div style="font-size:13px;color:#aaa">SAT 11</div>
<div class="time">9:41</div>
<div class="rings">◉</div>
<div style="font-size:13px">Apple Watch</div>
</div>
<div class="watch-notice"><b>新通知</b><br>已由 iPhone 同步</div>
</div>
</div>
<div class="explain">點「傳送／關閉通知」，iPhone 與 Apple Watch 會一起顯示通知。</div>
</div>
</section>
</main>
</div>
</body>
</html>
